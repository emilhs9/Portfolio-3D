<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – Visitor Log</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="light-theme">
  <section class="login-section" id="login-section">
    <h1>Admin Login</h1>
    <form id="login-form">
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p id="login-error" class="error" style="display:none;">Invalid password</p>
  </section>

  <section class="logs-section hidden" id="logs-section">
    <h1>Visitor Log</h1>
    <button id="logout-button" class="logout">Logout</button>
    <table class="logs-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Timestamp</th>
          <th>IP</th>
          <th>Device</th>
        </tr>
      </thead>
      <tbody id="logs-body"></tbody>
    </table>
  </section>

  <script src="/admin/admin.js"></script>
</body>
</html>
